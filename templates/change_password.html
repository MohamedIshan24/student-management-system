{% extends 'base.html' %}
{% block title %}Change Password{% endblock %}

{% block content %}
<h1 class="page-title">🔒 Change Password</h1>

<div class="card-dark" style="max-width: 450px; margin: auto;">
    {% if error %}
    <div style="background: rgba(239,68,68,0.15); color: #fca5a5; padding: 12px;
                border-radius: 8px; margin-bottom: 15px; border: 1px solid #ef4444;">
        ❌ {{ error }}
    </div>
    {% endif %}

    {% if success %}
    <div style="background: rgba(34,197,94,0.15); color: #86efac; padding: 12px;
                border-radius: 8px; margin-bottom: 15px; border: 1px solid #22c55e;">
        ✅ {{ success }}
    </div>
    {% endif %}

    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Current Password</label>
            <input type="password" class="form-control" name="current_password" required>
        </div>
        <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" class="form-control" name="new_password" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Confirm New Password</label>
            <input type="password" class="form-control" name="confirm_password" required>
        </div>
        <button type="submit" class="btn btn-success w-100">Update Password</button>
    </form>

    <br>
    <a href="/student/{{ session.get('student_id') }}" class="btn btn-secondary w-100">← Back to Profile</a>
</div>
{% endblock %}
