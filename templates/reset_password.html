{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<h1 class="page-title">🔑 Reset Student Password</h1>

<div class="card-dark" style="max-width: 450px; margin: auto;">
    {% if student %}
    <div style="background: rgba(99,102,241,0.1); padding: 12px; border-radius: 8px;
                margin-bottom: 15px; border: 1px solid var(--accent);">
        👤 Resetting password for: <strong>{{ student[0] }}</strong>
    </div>
    {% endif %}

    {% if error %}
    <div style="background: rgba(239,68,68,0.15); color: #fca5a5; padding: 12px;
                border-radius: 8px; margin-bottom: 15px; border: 1px solid #ef4444;">
        ❌ {{ error }}
    </div>
    {% endif %}

    <form method="POST">
        <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" class="form-control" name="new_password"
                   placeholder="Enter new password" required minlength="6">
        </div>
        <div class="mb-3">
            <label class="form-label">Confirm New Password</label>
            <input type="password" class="form-control" name="confirm_password"
                   placeholder="Confirm new password" required minlength="6">
        </div>
        <button type="submit" class="btn btn-success w-100">🔑 Reset Password</button>
    </form>

    <br>
    <a href="/students" class="btn btn-secondary w-100">← Back to Students</a>
</div>
{% endblock %}
