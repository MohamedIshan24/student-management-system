<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — EduSystem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #6366f1;
            --border: #334155;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            width: 420px;
            text-align: center;
        }
        .register-box h2 { color: var(--accent); margin-bottom: 8px; }
        .register-box p { color: var(--text-secondary); margin-bottom: 25px; font-size: 14px; }
        .form-control {
            background: var(--bg-primary) !important;
            border: 1px solid var(--border) !important;
            color: var(--text-primary) !important;
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 15px;
        }
        .form-control:focus {
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.2) !important;
        }
        .form-control::placeholder { color: var(--text-secondary) !important; }
        .btn-register {
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px;
            width: 100%;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-register:hover { background: #16a34a; }
        .login-link { margin-top: 15px; font-size: 14px; color: var(--text-secondary); }
        .login-link a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div style="position:fixed; top:20px; right:20px; min-width:300px; z-index:999;">
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <div class="register-box">
        <div style="font-size:40px; margin-bottom:10px;">📝</div>
        <h2>Register</h2>
        <p>Create your student account</p>

        <form action="/register" method="POST">
            <input class="form-control" name="username" placeholder="Username" required>
            <input class="form-control" type="password" name="password" placeholder="Password" required>
            <input class="form-control" name="name" placeholder="Full Name" required>
            <input class="form-control" name="email" placeholder="Email">
            <input class="form-control" name="reg_no" placeholder="Register Number">
            <button type="submit" class="btn-register">Register</button>
        </form>

        <p class="login-link">
            Already have an account? <a href="/">Login</a>
        </p>
    </div>
</body>
</html>
